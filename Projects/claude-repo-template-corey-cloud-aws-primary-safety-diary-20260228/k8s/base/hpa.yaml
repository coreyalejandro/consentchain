apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claude-template
  namespace: claude-template
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claude-template
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
