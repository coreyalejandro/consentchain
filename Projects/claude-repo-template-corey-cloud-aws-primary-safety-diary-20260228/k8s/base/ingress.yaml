apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-template
  namespace: claude-template
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: claude-template.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-template
                port:
                  number: 80
