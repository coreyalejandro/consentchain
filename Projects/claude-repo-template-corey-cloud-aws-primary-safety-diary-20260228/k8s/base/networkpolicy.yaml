apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-template-restrict
  namespace: claude-template
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: claude-template
  policyTypes: ['Ingress', 'Egress']
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
