apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: drop-all-capabilities
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-drop-all
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: 'Containers must drop ALL linux capabilities.'
        pattern:
          spec:
            containers:
              - (securityContext):
                  (capabilities):
                    drop:
                      - 'ALL'
