apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-run-as-nonroot
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: 'Pods must runAsNonRoot.'
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
