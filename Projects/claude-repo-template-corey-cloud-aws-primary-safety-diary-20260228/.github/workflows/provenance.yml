name: Provenance + Signing

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build_sign_attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          IMAGE="${{ steps.meta.outputs.tags }}"
          # cosign sign supports multiple tags; sign each line
          echo "$IMAGE" | while read -r tag; do
            cosign sign "$tag"
          done

      - name: Attest SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          ./scripts/sbom.sh
          IMAGE="${{ steps.meta.outputs.tags }}"
          echo "$IMAGE" | while read -r tag; do
            cosign attest --predicate artifacts/sbom/bom.json --type cyclonedx "$tag"
          done
