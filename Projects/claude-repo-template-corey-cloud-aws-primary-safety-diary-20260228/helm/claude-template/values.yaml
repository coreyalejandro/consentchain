replicaCount: 2

image:
  repository: ghcr.io/your-org/claude-template
  tag: '0.1.0'
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: claude-template.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
